<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <title>Merlin – Complete profile</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: #d6d2c4;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px 0;
    }

    .card {
      width: 393px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      background: #f8f1da;
    }

    /* Header */
    .header {
      height: 164px;
      position: relative;
      overflow: hidden;
      background: #6020fc;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .merlin-bg-logo {
      position: absolute;
      z-index: 1;

      width: 370px;
      height: auto;

      left: 50%;
      top: 50%;

      transform: translate(-53.5%, -50%);
      transform-origin: center center;

      display: block;
    }

    .merlin-logo {
      position: absolute;
      z-index: 10;

      width: 120px;
      height: 32px;

      left: calc(50% - 120px / 2 - 0.5px);
      top: calc(50% - 32px / 2);

      display: block;
    }

    /* Body */
    .body {
      background: #f8f1da;
      padding: 28px 20px 28px;
    }

    .title {
      width: 353px;

      color: #091464;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-style: normal;
      font-weight: 800;
      font-size: 32px;
      line-height: 36px;
      letter-spacing: 0;

      margin-bottom: 14px;
      white-space: nowrap;
    }

    .subtitle {
      width: 353px;

      color: #091464;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-style: normal;
      font-weight: 500;
      font-size: 16px;
      line-height: 160%;
      letter-spacing: 0;

      margin-bottom: 28px;
    }

    /* Form */
    .form {
      width: 353px;
    }

    .field-label {
      display: block;

      color: #091464;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-style: normal;
      font-weight: 600;
      font-size: 14px;
      line-height: 20px;

      margin-bottom: 8px;
    }

    .field-input {
      width: 100%;
      height: 52px;

      border: 1.5px solid #d5c9b0;
      border-radius: 12px;
      background: #ffffff;

      padding: 0 16px;
      margin-bottom: 6px;

      color: #091464;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-style: normal;
      font-weight: 500;
      font-size: 16px;
      line-height: 24px;

      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field-input::placeholder {
      color: #64748B;
      font-weight: 400;
    }

    .field-input:focus {
      border-color: #571CFF;
      box-shadow: 0 0 0 3px rgba(87, 28, 255, 0.15);
    }

    .field-error {
      min-height: 16px;
      margin-bottom: 10px;

      color: #c0392b;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      line-height: 16px;
      font-weight: 500;
    }

    .flow-error {
      margin-top: 12px;

      color: #c0392b;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 18px;
      font-weight: 500;
      text-align: center;
    }

    /* Checkbox */
    .checkbox-block {
      display: flex;
      gap: 10px;
      align-items: flex-start;

      width: 353px;
      margin-bottom: 14px;
    }

    .checkbox-block input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 2px;
      flex-shrink: 0;

      accent-color: #571CFF;
      cursor: pointer;
    }

    .checkbox-text {
      color: #170F30;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-style: normal;
      font-weight: 400;
      font-size: 12px;
      line-height: 16px;

      cursor: pointer;
    }

    .checkbox-title {
      display: block;
      margin-bottom: 4px;

      color: #170F30;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-weight: 600;
      font-size: 12px;
      line-height: 16px;
    }

    /* Primary button */
    .btn-continue {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 8px;

      width: 100%;
      min-width: 40px;
      height: 40px;
      padding: 8px 16px;

      margin-top: 16px;
      margin-bottom: 20px;

      border: none;
      border-radius: 24px;

      background: #571CFF;
      opacity: 0.5;
      color: #FFFFFF;

      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-style: normal;
      font-weight: 600;
      font-size: 16px;
      line-height: 24px;

      cursor: not-allowed;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-continue.is-active {
      opacity: 1;
      cursor: pointer;
    }

    .btn-continue.is-active:active {
      transform: scale(0.98);
    }

    .btn-continue:disabled {
      opacity: 0.5;
    }

    /* Login block */
    .login-block {
      width: 353px;
      text-align: center;
      margin-top: 8px;
    }

    .login-text {
      color: #091464;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-style: normal;
      font-weight: 400;
      font-size: 14px;
      line-height: 20px;

      margin-bottom: 10px;
    }

    .btn-login {
      min-width: 120px;
      height: 40px;
      padding: 8px 16px;

      border: 1.5px solid #571CFF;
      border-radius: 24px;
      background: transparent;

      color: #571CFF;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-style: normal;
      font-weight: 600;
      font-size: 16px;
      line-height: 24px;

      cursor: pointer;
    }

    .btn-login:hover {
      background: rgba(87, 28, 255, 0.08);
    }

    .divider {
      width: 353px;
      height: 1px;
      background: #d5c9b0;
      margin: 24px 0 16px;
    }

    .footer-text {
      width: 353px;

      color: #170F30;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-style: normal;
      font-weight: 400;
      font-size: 12px;
      line-height: 16px;
    }

    .footer-text strong {
      color: #170F30;
      font-weight: 400;
    }
  </style>
</head>

<body>
  <div class="card">

    <div class="header merlin-header">
      <svg
        class="merlin-bg-logo"
        width="378"
        height="176"
        viewBox="0 0 378 176"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path
          d="M370.171 148.701C380.068 118.24 386.581 61.2927 340.218 46.2282C293.854 31.1637 257.54 63.1799 204.117 104.886L243.375 -15.9368C263.76 -78.6771 241.16 -100.505 216.777 -108.427C192.394 -116.35 170.108 -106.331 141.058 -85.0304L-16.6941 33.8237L-0.23429 -16.8344L-78.8416 -42.3754L-113.346 63.8173C-133.731 126.558 -111.131 148.385 -86.7478 156.308C-62.365 164.23 -32.1088 156.801 -3.05901 135.5L143.034 25.4111L107.253 135.534C86.867 198.275 109.468 220.102 133.85 228.025C158.233 235.947 178.627 225.313 207.677 204.013L287.172 144.103C275.079 178.598 250.947 265.871 308.047 284.423C338.252 294.238 368.771 289.468 373.579 286.806C340.006 258.999 354.494 197.32 370.159 148.737L370.171 148.701Z"
          fill="#091464"
        />
      </svg>

      <svg
        class="merlin-logo"
        width="120"
        height="32"
        viewBox="0 0 120 32"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
        aria-label="Merlin"
        role="img"
      >
        <path
          d="M21.8838 3.09766C24.0356 3.09766 26.4062 4.2498 26.4062 9.7666V20.3906C29.589 15.693 31.6574 12.208 35.749 12.208C39.8405 12.2081 40.7978 16.9056 40.7979 19.584V19.5869C40.8075 23.8557 41.2502 29.1365 44.6514 30.4805C44.3354 30.8169 42.0232 31.9844 39.3584 31.9844C34.3197 31.984 33.9821 24.4193 34.0527 21.3633L29.2617 28.1826C27.4954 30.6273 26.1429 31.9999 23.9912 32C21.8394 32 19.4688 30.8479 19.4688 25.3311V15.6484L10.6631 28.1787C8.89681 30.6233 6.67412 31.9969 4.52246 31.9971C2.37067 31.9971 3.58377e-05 30.8448 0 25.3281V15.9902H6.9375V20.4443L16.4473 6.91504C18.2135 4.47057 19.7323 3.09782 21.8838 3.09766ZM53.3682 12.1436C56.3035 12.1436 58.542 13.0946 60.2666 14.6689C62.5436 16.7522 63.6071 20.0804 63.5332 23.7764H50.1719C50.5766 25.933 51.7498 27.251 53.8438 27.251C55.0543 27.2508 55.9344 26.7742 56.4482 25.8623H63.1631C62.7584 27.5455 61.4386 29.1901 59.6016 30.3613C57.8769 31.4589 56.0044 31.9326 53.6182 31.9326C47.4905 31.9325 43.3799 27.7631 43.3799 22.0576L43.3857 22.0547C43.3857 16.4227 47.4619 12.1436 53.3682 12.1436ZM88.1338 31.4141H81.0137V5.26758H88.1338V31.4141ZM97.8848 31.4141H90.9473V12.7646H97.8848V31.4141ZM113.429 12.1797C117.761 12.1797 120 15.0693 120 19.3477V31.4141H113.062V21.0273C113.062 19.0881 112.257 17.8076 110.458 17.8076C108.66 17.8077 107.632 19.3439 107.632 21.3564V31.4141H100.694V12.7646H107.301V15.3252H107.41C108.916 13.2773 110.824 12.1798 113.429 12.1797ZM78.0137 12.3613C78.5629 12.3613 78.933 12.4351 79.1514 12.5439V18.4316H79.0029C74.9276 17.7374 72.5449 19.5649 72.5449 23.7695V31.4111H65.6074V12.7617H72.2139V15.5771L72.2168 15.5811H72.3262C73.8323 13.242 75.6309 12.3614 78.0137 12.3613ZM53.5186 16.7871C51.611 16.7873 50.5448 18.0674 50.1787 20.1152H56.6377C56.3454 18.032 55.1693 16.7871 53.5186 16.7871ZM94.7275 0C94.7275 2.90872 97.0944 5.26745 100.014 5.26758V5.8916C97.0945 5.89173 94.7276 8.24957 94.7275 11.1582H94.1016C94.1015 8.24949 91.7338 5.8916 88.8145 5.8916V5.26758C91.7338 5.26758 94.1016 2.9088 94.1016 0H94.7275Z"
          fill="#FAF1D9"
        />
      </svg>
    </div>

    <div class="body">
      <h1 class="title">Complete profile</h1>

      <p class="subtitle">
        Share your name and email so we can find your spot in the adventure.
      </p>

      <form id="registerForm" class="form">
        <label for="givenName" class="field-label">First Name</label>
        <input
          class="field-input"
          type="text"
          id="givenName"
          name="givenName"
          data-id="givenName"
          placeholder="Insert your first name"
          required
        />
        <div
          data-skcomponent="skerrormessage"
          data-skerrorid="givenName"
          class="field-error"
        ></div>

        <label for="familyName" class="field-label">Last Name</label>
        <input
          class="field-input"
          type="text"
          id="familyName"
          name="familyName"
          data-id="familyName"
          placeholder="Insert your last name"
          required
        />
        <div
          data-skcomponent="skerrormessage"
          data-skerrorid="familyName"
          class="field-error"
        ></div>

        <label for="userEmail" class="field-label">Email</label>
        <input
          class="field-input"
          type="email"
          id="userEmail"
          name="userEmail"
          data-id="userEmail"
          placeholder="Insert your email address"
          required
        />
        <div
          data-skcomponent="skerrormessage"
          data-skerrorid="userEmail"
          class="field-error"
        ></div>

        <!-- Checkbox 1: Terms - mandatory -->
        <div class="checkbox-block">
          <input
            type="checkbox"
            id="termsAccepted"
            name="termsAccepted"
            data-id="termsAccepted"
            value="true"
            required
          />
          <label class="checkbox-text" for="termsAccepted">
            <span class="checkbox-title">
              Please accept our Terms &amp; Conditions
            </span>
            By ticking this box, I confirm that I have read and agreed to the
            Terms and Conditions of sale and note that tickets are non-refundable
            and non-transferable once purchased. Tickets for: LEGOLAND&reg;
            Deutschland Resort, LEGOLAND Allee 1, 89312 G&uuml;nzburg, Germany
          </label>
        </div>

        <!-- Checkbox 2: Marketing - optional -->
        <div class="checkbox-block">
          <input
            type="checkbox"
            id="marketingOptIn"
            name="marketingOptIn"
            data-id="marketingOptIn"
            value="true"
          />
          <label class="checkbox-text" for="marketingOptIn">
            <span class="checkbox-title">
              Yes, I would like to receive exclusive offers, tailored marketing
              and updates from LEGOLAND&reg; Deutschland and their owner Merlin
              Entertainments Group,
            </span>
            about the brands and attractions by email and SMS. Merlin can also
            upload my name and contact details to the marketing tool
            &ldquo;Facebook Custom Audience&rdquo; enabling Merlin to display
            targeted advertising to me on Facebook.<br /><br />
            We will process your personal data as described in the Privacy
            Notice. I understand I can unsubscribe from marketing at any time by
            clicking the unsubscribe link in any marketing email, replying STOP
            to any marketing SMS, or emailing.
          </label>
        </div>

        <button
          type="submit"
          id="btnContinue"
          data-id="btnContinue"
          data-skcomponent="skbutton"
          data-skbuttontype="form-submit"
          data-skform="registerForm"
          data-skbuttonvalue="button-register"
          class="btn-continue btn-disabled"
          disabled
        >
          Continue
        </button>
      </form>

      <div
        data-skcomponent="skerror"
        data-id="feedback"
        class="flow-error"
      ></div>

      <div class="login-block">
        <p class="login-text">Already have an account?</p>

        <button
          type="button"
          id="btnLogin"
          data-id="btnLogin"
          data-skcomponent="skbutton"
          data-skbuttontype="next-event"
          data-skbuttonvalue="Login"
          class="btn-login"
        >
          Log in
        </button>
      </div>

      <div class="divider"></div>

      <p class="footer-text">
        <strong>Merlin Entertainments</strong> is the magic behind your favorite
        attractions. We&rsquo;re here to make sure your experience is seamless,
        safe, and, most importantly, made for play.
      </p>
    </div>

  </div>

  <script>
    (function () {
      const givenName = document.getElementById('givenName');
      const familyName = document.getElementById('familyName');
      const emailField = document.getElementById('userEmail');
      const termsAccepted = document.getElementById('termsAccepted');
      const btn = document.getElementById('btnContinue');

      function prefillEmail() {
        const savedEmail = sessionStorage.getItem('merlin_user_email');

        if (!emailField || !savedEmail) return;

        emailField.value = savedEmail;
        emailField.setAttribute('value', savedEmail);

        emailField.dispatchEvent(new Event('input', { bubbles: true }));
        emailField.dispatchEvent(new Event('change', { bubbles: true }));
      }

      function updateContinueButtonState() {
        const isComplete =
          givenName.value.trim().length > 0 &&
          familyName.value.trim().length > 0 &&
          emailField.checkValidity() &&
          termsAccepted.checked;

        btn.classList.toggle('is-active', isComplete);
        btn.classList.toggle('btn-disabled', !isComplete);
        btn.disabled = !isComplete;
      }

      [givenName, familyName, emailField, termsAccepted].forEach((field) => {
        if (!field) return;

        field.addEventListener('input', updateContinueButtonState);
        field.addEventListener('change', updateContinueButtonState);
      });

      window.addEventListener('load', function () {
        setTimeout(prefillEmail, 200);
        setTimeout(prefillEmail, 500);
        setTimeout(prefillEmail, 1000);

        setTimeout(updateContinueButtonState, 250);
        setTimeout(updateContinueButtonState, 550);
        setTimeout(updateContinueButtonState, 1050);
      });

      prefillEmail();
      updateContinueButtonState();
    })();
  </script>
</body>
</html>
